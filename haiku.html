<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俳句 - 十六月書房</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200..900&family=Zen+Kaku+Gothic+New:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .uc-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            color: var(--text-color, #e0e0e0);
            padding: 2rem;
        }
        .uc-container h1 {
            font-family: 'Noto Serif JP', serif;
            font-size: 3rem;
            margin-bottom: 1rem;
            letter-spacing: 0.1em;
        }
        .uc-container p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
        }
        .uc-container a {
            color: inherit;
            text-decoration: none;
            border-bottom: 1px solid currentColor;
            padding-bottom: 2px;
            transition: opacity 0.3s;
        }
        .uc-container a:hover {
            opacity: 0.7;
        }
    </style>
</head>
<body style="background: var(--bg-color, #0a0a0a);">

        <h1>俳句</h1>

</html>
